<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Player Comparison | StatHut</title>

    <link
        rel="stylesheet"
        href="compare.css">

    <script
        src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>

</head>

<body>
    
    <div class="container">

        <!-- Hero -->

        <section class="hero">

            <div class="hero-icon">
        
                ⚔️
        
            </div>
        
            <h1>
        
                Player Comparison
        
            </h1>
        
            <p>
        
                Compare any two Clash of Clans players with
                live statistics, hero progression, donation trends,
                war history and builder performance.
        
            </p>
        
        </section>
        <!-- Search -->

        <section class="compare-search">

            <div class="player-input">

                <label>

                    Player One

                </label>

                <input
                    id="player1-tag"
                    placeholder="#R2RGPCG">

            </div>

            <div class="vs">

                VS

            </div>

            <div class="player-input">

                <label>

                    Player Two

                </label>

                <input
                    id="player2-tag"
                    placeholder="#ABC123">

            </div>

        </section>

        <div class="button-area">

            <button
                onclick="comparePlayers()">

                Compare Players

            </button>

        </div>

        <section
            id="comparison-results">

        </section>

        <section id="comparison-charts">

            <div class="chart-card">
        
                <h2>🏆 Trophy History</h2>
        
                <canvas id="trophyChart"></canvas>
        
            </div>
        
            <div class="chart-card">
        
                <h2>⭐ Hero Score History</h2>
        
                <canvas id="heroChart"></canvas>
        
            </div>
        
            <div class="chart-card">
        
                <h2>🛠 Builder History</h2>
        
                <canvas id="builderChart"></canvas>
        
            </div>
        
            <div class="chart-card">
        
                <h2>🎁 Donation History</h2>
        
                <canvas id="donationChart"></canvas>
        
            </div>
        
            <div class="chart-card">
        
                <h2>⚔ War Stars History</h2>
        
                <canvas id="warChart"></canvas>
        
            </div>
        
        </section>

    </div>

    <script src="compare.js"></script>

</body>

</html>
