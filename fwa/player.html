<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Search | StatHut</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:"Segoe UI",sans-serif;
}

body{

    background:linear-gradient(
        135deg,
        #dbeafe,
        #eef2ff
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

}

.container{

    width:100%;

    max-width:1000px;

}

h1{

    text-align:center;

    color:#1f3c88;

    margin-bottom:30px;

    font-size:42px;

}

.search-box{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-bottom:40px;

}

.search-box input{

    width:420px;

    padding:16px;

    border:none;

    border-radius:14px;

    font-size:16px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.search-box button{

    border:none;

    background:#2563eb;

    color:white;

    padding:16px 26px;

    border-radius:14px;

    cursor:pointer;

    font-weight:700;

    transition:.25s;

}

.search-box button:hover{

    transform:translateY(-2px);

    background:#1d4ed8;

}

.player-card{

    background:white;

    border-radius:24px;

    padding:35px;

    box-shadow:0 20px 45px rgba(0,0,0,.10);

    animation:fadeUp .5s ease;

}

.player-header{

    text-align:center;

    margin-bottom:35px;

}

.player-header h2{

    font-size:42px;

    color:#1f3c88;

    margin-bottom:10px;

}

.player-tag{

    display:inline-block;

    padding:8px 18px;

    border-radius:999px;

    background:#eef2ff;

    color:#304a9c;

    font-weight:700;

    margin-bottom:14px;

}

.player-clan{

    color:#6b7280;

    font-size:18px;

}

.player-top-stats{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:35px;

}

.top-stat{

    background:#f8fbff;

    border-radius:18px;

    padding:22px;

    text-align:center;

}

.top-stat span{

    font-size:34px;

}

.top-stat h3{

    margin:12px 0 6px;

    color:#1f3c88;

    font-size:30px;

}

.top-stat small{

    color:#6b7280;

}

.overview-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.overview-card{

    background:#f8fbff;

    border-radius:18px;

    padding:24px;

    text-align:center;

}

.overview-card h4{

    margin-bottom:14px;

    color:#1f3c88;

}

.overview-card p{

    font-size:30px;

    font-weight:800;

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(25px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

</style>

<body>

<div class="container">

    <h1>🔍 Player Search</h1>

    <div class="search-box">

        <input
            id="player-tag"
            type="text"
            placeholder="Enter Player Tag (P280R8R)"
        >

        <button
            onclick="searchPlayer()"
        >
            Search
        </button>

    </div>

    <div id="player-card" class="player-card" style="display:none;">

    <div class="player-header">

        <h2 id="player-name">
            Loading...
        </h2>

        <div id="player-tag" class="player-tag">
            #TAG
        </div>

        <p id="player-clan" class="player-clan">
            Clan
        </p>

    </div>

    <div class="player-top-stats">

        <div class="top-stat">
            <span>🏰</span>
            <h3 id="townhall">18</h3>
            <small>Town Hall</small>
        </div>

        <div class="top-stat">
            <span>⭐</span>
            <h3 id="exp">253</h3>
            <small>XP Level</small>
        </div>

        <div class="top-stat">
            <span>🏆</span>
            <h3 id="league">Unranked</h3>
            <small>League</small>
        </div>

    </div>

    <div class="overview-grid">

        <div class="overview-card">
            <h4>🏆 Trophies</h4>
            <p id="trophies"></p>
        </div>

        <div class="overview-card">
            <h4>⭐ Best</h4>
            <p id="best"></p>
        </div>

        <div class="overview-card">
            <h4>⚔ War Stars</h4>
            <p id="warstars"></p>
        </div>

        <div class="overview-card">
            <h4>🤝 Donations</h4>
            <p id="donations"></p>
        </div>

    </div>

</div>

<script>

async function searchPlayer() {

    const tag = document
        .getElementById("player-tag")
        .value
        .trim()
        .replace("#", "");

    if (!tag) {

        alert("Enter a Player Tag");

        return;

    }

    try {

        const response = await fetch(
            `https://api.stathut.in/api/player/${tag}`
        );

        const player = await response.json();

        document.getElementById("player-card").style.display =
            "block";

        document.getElementById("player-name").textContent =
            player.name;

        document.getElementById("player-clan").textContent =
            player.clan;

        document.getElementById("townhall").textContent =
            player.townHall;

        document.getElementById("exp").textContent =
            player.expLevel;

        document.getElementById("trophies").textContent =
            player.trophies;

        document.getElementById("best").textContent =
            player.bestTrophies;

        document.getElementById("warstars").textContent =
            player.warStars;

        document.getElementById("donations").textContent =
            player.donations;

    }

    catch (error) {

        console.error(error);

        alert("Player not found");

    }

}

</script>

</body>

</html>
