<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Search | StatHut</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:"Segoe UI",sans-serif;
}

body{

    background:linear-gradient(
        135deg,
        #dbeafe,
        #eef2ff
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

}

.container{

    width:100%;

    max-width:1000px;

}

h1{

    text-align:center;

    color:#1f3c88;

    margin-bottom:30px;

    font-size:42px;

}

.search-box{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-bottom:40px;

}

.search-box input{

    width:420px;

    padding:16px;

    border:none;

    border-radius:14px;

    font-size:16px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.search-box button{

    border:none;

    background:#2563eb;

    color:white;

    padding:16px 26px;

    border-radius:14px;

    cursor:pointer;

    font-weight:700;

    transition:.25s;

}

.search-box button:hover{

    transform:translateY(-2px);

    background:#1d4ed8;

}

.player-card{

    background:white;

    border-radius:24px;

    padding:35px;

    box-shadow:0 20px 45px rgba(0,0,0,.10);

    animation:fadeUp .5s ease;

}

.player-banner{

    position:relative;

    height:300px;

    border-radius:24px;

    overflow:hidden;

    margin-bottom:35px;

    background:linear-gradient(
        135deg,
        #1f3c88,
        #3458b5
    );

}
.player-banner::before{

    content:"";

    position:absolute;

    inset:0;

    background:linear-gradient(

        rgba(15,23,42,.25),

        rgba(15,23,42,.45)

    );

    z-index:1;

}
    

.player-header h2{

    font-size:42px;

    color:#1f3c88;

    margin-bottom:10px;

}

.player-tag{

    display:inline-block;

    padding:8px 18px;

    border:1px solid rgba(255,255,255,.25);

    background:rgba(255,255,255,.20);

    color:#FFFFFF;

    font-weight:700;

    margin-bottom:14px;

}

.player-clan{

    color:rgba(255,255,255,.9);

    font-size:20px;

    font-weight:600;

}

.player-top-stats{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:35px;

}

.top-stat{

    background:#f8fbff;

    border-radius:18px;

    padding:22px;

    text-align:center;

}

.top-stat span{

    font-size:34px;

}

.top-stat h3{

    margin:12px 0 6px;

    color:#1f3c88;

    font-size:30px;

}

.top-stat small{

    color:#6b7280;

}

.overview-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.overview-card{

    background:#f8fbff;

    border-radius:18px;

    padding:24px;

    text-align:center;

}

.overview-card h4{

    margin-bottom:14px;

    color:#1f3c88;

}

.overview-card p{

    font-size:30px;

    font-weight:800;

}

.th-banner{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    object-fit:cover;

    opacity:.25;

}

.banner-overlay{

    position:relative;

    z-index:2;

    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

}

.player-banner h2{

    color:white;

    font-size:48px;

    text-shadow:
        0 3px 12px rgba(0,0,0,.35);

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(25px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

    .heroes-section{

        margin-top:40px;

    }

    .heroes-section h2{
    
        color:#1f3c88;
    
        margin-bottom:25px;
    
        font-size:32px;
    
    }

    #heroes-grid{
    
        display:grid;
    
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    
        gap:20px;
    
    }

    .hero-card{

        background:white;
    
        border-radius:22px;
    
        padding:22px;
    
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    
        transition:all .25s ease;
    
        overflow:hidden;

    }

    .hero-card:hover{

        transform:translateY(-6px);
    
        box-shadow:0 20px 45px rgba(0,0,0,.15);

    }
    
    .hero-card h3{
    
        color:#1f3c88;
    
        margin-bottom:8px;
    
    }
    
    .hero-card p{
    
        color:#6b7280;
    
        margin-bottom:14px;
    
    }
    
    .hero-bar{
    
        width:100%;
    
        height:10px;
    
        background:#ececec;
    
        border-radius:999px;
    
        overflow:hidden;
    
        margin-bottom:18px;
    
    }
    
    .hero-fill{
    
        height:100%;

        border-radius:999px;
    
        background:linear-gradient(
            90deg,
            #4CAF50,
            #81C784
        );
        position:relative;
        
        overflow:hidden;
    
        transition:width .8s ease;
    
    }

    .hero-fill::after{

    content:"";

    position:absolute;

    left:-40%;

    top:0;

    width:35%;

    height:100%;

    background:rgba(255,255,255,.35);

    transform:skewX(-20deg);

    animation:shine 2.5s infinite;

}
    
    .equipment-list{
    
        margin:0;
    
        padding-left:18px;
    
    }
    
    .equipment-list li{
    
        margin-bottom:8px;
    
    }
    
    .hero-title{

        display:flex;
    
        align-items:center;
    
        gap:14px;
    
        margin-bottom:14px;

    }

    .hero-title h3{

        font-size:22px;
    
        color:#1f3c88;

    }
    
    .hero-icon{
    
        width:68px;
    
        height:68px;
    
        object-fit:contain;

        transition:.3s;
    
    }
    
    .equipment-container{

        display:flex;
    
        flex-direction:column;
    
        gap:8px;
    
        margin-top:15px;
    
    }

    .equipment-pill{
    
        display:flex;
    
        justify-content:space-between;
    
        align-items:center;
    
        padding:10px 14px;
    
        background:#f7f9fc;
    
        border-radius:12px;
    
        font-size:14px;
    
    }

    .equipment-pill strong{
    
        color:#2563eb;
    
    }

    .hero-level{

        display:flex;
    
        justify-content:space-between;
    
        align-items:center;
    
        margin-bottom:15px;
    
        color:#6b7280;
    
    }

    .hero-percent{
    
        background:#2563eb;
    
        color:white;
    
        padding:5px 12px;
    
        border-radius:999px;
    
        font-size:13px;
    
        font-weight:700;
    
    }

    .hero-max{
    
        background:#16a34a;
    
        color:white;
    
        padding:5px 12px;
    
        border-radius:999px;
    
        font-size:13px;
    
        font-weight:700;
    
    }

    .hero-card:hover .hero-icon{

        transform:scale(1.15) rotate(-5deg);
    
    }

    @keyframes shine{

        0%{
    
            left:-40%;
    
        }
    
        100%{
    
            left:130%;
    
        }
    
    }

    .banner-stats{

        display:flex;
    
        gap:18px;
    
        margin-top:24px;
    
    }

    .banner-stat{
    
        background:rgba(255,255,255,.15);
    
        backdrop-filter:blur(8px);
    
        padding:10px 18px;
    
        border-radius:999px;
    
        color:white;
    
        font-weight:700;
    
        font-size:15px;
    
    }

    .military-tabs{

        display:flex;
    
        gap:12px;
    
        margin:25px 0;
    
    }

    .military-tab{
    
        border:none;
    
        padding:12px 22px;
    
        border-radius:999px;
    
        background:#eef2ff;
    
        cursor:pointer;
    
        font-weight:700;
    
        transition:.25s;
    
    }

    .military-tab:hover{

        transform:translateY(-2px);
    
    }

    .military-tab.active{
    
        background:#2563eb;
    
        color:white;

        box-shadow:
            0 8px 18px rgba(37,99,235,.35);
    
    }

    #military-grid{
    
        display:grid;
    
        grid-template-columns:
            repeat(auto-fit,minmax(180px,1fr));
    
        gap:18px;
        transition:opacity .25s ease;
    
    }

    #military-grid.fade{

        opacity:0;
    
    }

    .military-card{

        background:white;
    
        border-radius:18px;
    
        padding:18px;
    
        text-align:center;
    
        box-shadow:0 8px 20px rgba(0,0,0,.08);
    
        transition:.25s;
    
    }

    .military-card:hover{
    
        transform:translateY(-8px);
        box-shadow:0 20px 35px rgba(0,0,0,.12);
    
    }

    .military-card img{
    
        width:72px;
    
        height:72px;
    
        object-fit:contain;
    
        margin-bottom:12px;

        transition:.25s;
    
    }

    .military-card h4{
    
        color:#1f3c88;
    
        margin-bottom:10px;
    
    }

    .military-card small{
    
        color:#6b7280;
    
    }

    .military-card:hover img{

        transform:scale(1.08);
    
    }

    .section-heading{

        display:flex;
    
        align-items:center;
    
        gap:18px;
    
        margin-bottom:20px;
    
    }

    .section-line{
    
        flex:1;
    
        height:2px;
    
        background:#e7ebf5;
    
        border-radius:999px;
    
    }

    .max-badge{

        background:#2dbb55;
    
        color:white;
    
        padding:4px 10px;
    
        border-radius:20px;
    
        font-size:12px;
    
        font-weight:bold;
    
    }

    @keyframes cardUp{

        from{
    
            opacity:0;
            transform:translateY(20px);
    
        }
    
        to{
    
            opacity:1;
            transform:translateY(0);
    
        }
    
    }

.military-card{

    animation:cardUp .35s ease;

}

</style>

<body>

<div class="container">

    <h1>🔍 Player Search</h1>

    <div class="search-box">

        <input
            id="player-tag"
            type="text"
            placeholder="Enter Player Tag (P280R8R)"
        >

        <button
            onclick="searchPlayer()"
        >
            Search
        </button>

    </div>

    <div id="player-card" class="player-card" style="display:none;">

    <div class="player-header">

    <div class="player-banner">
        <img id="th-banner" class="th-banner">

        <div class="banner-overlay">

            <h2 id="player-name">
                Loading...
            </h2>

           <div id="player-tag-badge" class="player-tag">
                #TAG
           </div>
            
           <p id="player-clan" class="player-clan">
                Clan
           </p>
            
           <div class="banner-stats">
               <div class="banner-stat">
                   🏰 TH<span id="banner-th">18</span>
               </div>
               <div class="banner-stat">
                   ⭐ XP<span id="banner-xp">253</span>
               </div>
               <div class="banner-stat">
                   🏆 <span id="banner-league">Unranked</span>
               </div>
           </div>
        </div>
    </div>

    <section
        id="heroes-section"
        class="heroes-section"
        style="display:none;"
    >

        <h2>❤️ Heroes</h2>
    
        <div id="heroes-grid">
    
        </div>

    </section>

    <section id="pets-section">

        <h2 class="section-title">
            🐾 Pets
        </h2>
    
        <div id="pets-grid" class="heroes-grid">
    
        </div>
    
    </section>

    <section id="military-section" style="display:none;">

        <div class="section-heading">

            <h2 class="section-title">
                ⚔ Military
                <span id="military-count"></span>
            </h2>
        
            <div class="section-line"></div>
        
        </div>
    
        <div class="military-tabs">
    
            <button class="military-tab active"
                    onclick="showMilitary(event,'troops')">
                🪖 Troops
            </button>
    
            <button class="military-tab"
                    onclick="showMilitary(event,'super')">
                🔥 Super Troops
            </button>
    
            <button class="military-tab"
                    onclick="showMilitary(event,'siege')">
                🚪 Siege Machines
            </button>
    
        </div>
    
        <div id="military-grid"></div>
    
    </section>

    <div class="player-top-stats">

        <div class="top-stat">
            <span>🏰</span>
            <h3 id="townhall">18</h3>
            <small>Town Hall</small>
        </div>

        <div class="top-stat">
            <span>⭐</span>
            <h3 id="exp">253</h3>
            <small>XP Level</small>
        </div>

        <div class="top-stat">
            <span>🏆</span>
            <h3 id="league">Unranked</h3>
            <small>League</small>
        </div>

    </div>

    <div class="overview-grid">

        <div class="overview-card">
            <h4>🏆 Trophies</h4>
            <p id="trophies"></p>
        </div>

        <div class="overview-card">
            <h4>⭐ Best</h4>
            <p id="best"></p>
        </div>

        <div class="overview-card">
            <h4>⚔ War Stars</h4>
            <p id="warstars"></p>
        </div>

        <div class="overview-card">
            <h4>🤝 Donations</h4>
            <p id="donations"></p>
        </div>

    </div>

</div>

<script>

async function searchPlayer() {

    const tag = document
        .getElementById("player-tag")
        .value
        .trim()
        .replace("#", "");

    if (!tag) {

        alert("Enter a Player Tag");

        return;

    }

    try {

        const response = await fetch(
            `https://api.stathut.in/api/player/${tag}`
        );

        const player = await response.json();

        const heroesGrid =
            document.getElementById("heroes-grid");
    
        heroesGrid.innerHTML = "";
    
        document.getElementById("heroes-section").style.display =
            "block";
        
        document.getElementById("donations").textContent =
            player.donations;

        document.getElementById("pets-grid").innerHTML = "";

        document.getElementById("pets-section").style.display = "block";
        
        const heroImages = {
            "Barbarian King":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-22.png",
            "Archer Queen":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-23.png",
            "Grand Warden":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-24.png",
            "Royal Champion":
                "/fwa/assets/heroes/RC_Wastelands_01_NoShadow.png",
            "Minion Prince":
                "/fwa/assets/heroes/MinionPrince_wwe_f82_3k.png",
            "Dragon Duke":
                "/fwa/assets/heroes/DD_SoundOfClash_f10_4k.png"};
        
        const thImages = {

            18: "/fwa/assets/th/th18.png",
        
            17: "/fwa/assets/th/th17.png",
        
            16: "/fwa/assets/th/th16.png",
        
            15: "/fwa/assets/th/th15.png"
        
        };

        const petImages = {

            "L.A.S.S.I": "/fwa/assets/pets/Icon_HV_Hero_Pets_LASSI.png",
        
            "Electro Owl": "/fwa/assets/pets/Icon_HV_Hero_Pets_Electro_Owl.png",
        
            "Mighty Yak": "/fwa/assets/pets/Icon_HV_Hero_Pets_Mighty_Yak.png",
        
            "Unicorn": "/fwa/assets/pets/Icon_HV_Hero_Pets_Unicorn.png",
        
            "Frosty": "/fwa/assets/pets/Icon_HV_Hero_Pets_Frosty.png",
        
            "Diggy": "/fwa/assets/pets/Icon_HV_Hero_Pets_Diggy.png",
        
            "Poison Lizard": "/fwa/assets/pets/Icon_HV_Hero_Pets_Poison_Lizard.png",
        
            "Phoenix": "/fwa/assets/pets/Icon_HV_Hero_Pets_Phoenix.png",
        
            "Spirit Fox": "/fwa/assets/pets/Icon_HV_Hero_Pets_Spirit_Fox.png",
        
            "Angry Jelly": "/fwa/assets/pets/Hero_Pet_HV_Angry_Jelly_05.png",
        
            "Sneezy": "/fwa/assets/pets/Icon_HV_Hero_Pets_Sneezy.png"
        
        };
        
        player.heroes
            .filter(hero => hero.village === "home")
            .forEach(hero => {
                
                const percent =
                    (hero.level / hero.maxLevel) * 100;
                const heroStatus =
                    hero.level === hero.maxLevel
                        ? `<span class="hero-max">MAX</span>`
                        : `<span class="hero-percent">${Math.round(percent)}%</span>`;

                const equipment = hero.equipment
                    ? hero.equipment.map(eq =>
                        `
                        <div class="equipment-pill">
                        <span>${eq.name}</span>
                        <strong>Lv ${eq.level}</strong>
                        </div>
                        `
                        ).join("")
                        : "";

                heroesGrid.innerHTML += `

                <div class="hero-card">
                
                   <div class="hero-title">
                       <img
                           src="${heroImages[hero.name]}"
                           class="hero-icon"
                           alt="${hero.name}"
                       >
                       <h3>${hero.name}</h3>
                   </div>    

                    <div class="hero-level">
                        <span>
                            Level ${hero.level} / ${hero.maxLevel}
                        </span>
                        ${heroStatus}
                    </div>
                    

                    <div class="hero-bar">

                        <div
                            class="hero-fill"
                            style="width:${percent}%"
                        ></div>

                    </div>

                    <div class="equipment-container">
                    
                        ${equipment}

                    </ul>

                </div>

                `;

            });

        const petsGrid = document.getElementById("pets-grid");

        petsGrid.innerHTML = "";
        
        player.pets.forEach(pet => {

            const percent =
                (pet.level / pet.maxLevel) * 100;
        
            const petStatus =
                pet.level === pet.maxLevel
                    ? `<span class="hero-max">MAX</span>`
                    : `<span class="hero-percent">${Math.round(percent)}%</span>`;

            petsGrid.innerHTML += `
        
                <div class="hero-card">
        
                    <div class="hero-title">
        
                        <img
                            src="${petImages[pet.name]}"
                            class="hero-icon"
                            alt="${pet.name}"
                        >
        
                        <h3>${pet.name}</h3>
        
                    </div>

                    <div class="hero-level">
        
                        <span>
        
                            Level ${pet.level} / ${pet.maxLevel}
        
                        </span>
        
                        ${petStatus}
        
                    </div>

                    <div class="hero-bar">
        
                        <div
                            class="hero-fill"
                            style="width:${percent}%"
                        ></div>
        
                    </div>

                </div>
            
            `;

        });

        window.playerData = player;

        document.getElementById("military-section")
            .style.display = "block";
        
        showMilitary(null, "troops");

        document.getElementById("player-card").style.display =
            "block";

        document.getElementById("player-name").textContent =
            player.name;

        document.getElementById("player-tag-badge").textContent =
            player.tag;

        document.getElementById("player-clan").textContent =
            player.clan;

        document.getElementById("townhall").textContent =
            player.townHall;

        document.getElementById("banner-th").textContent =
            player.townHall;

        document.getElementById("th-banner").src =
            thImages[player.townHall];

        document.getElementById("exp").textContent =
            player.expLevel;

        document.getElementById("banner-xp").textContent =
            player.expLevel;

        document.getElementById("trophies").textContent =
            player.trophies;

        document.getElementById("best").textContent =
            player.bestTrophies;

        document.getElementById("league").textContent =
            player.league ?? "Unranked";

        document.getElementById("banner-league").textContent =
            player.league ?? "Unranked";

        document.getElementById("warstars").textContent =
            player.warStars;

        document.getElementById("donations").textContent =
            player.donations;

        document.getElementById("military-count")
            .textContent = `(${items.length})`;

    }

    catch (error) {

        console.error(error);

        alert("Player not found");

    }

}
    const troopImages = {

        "Barbarian": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr_Mesa de trabajo 1.png",
        "Archer": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-02.png",
        "Goblin": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-03.png",
        "Giant": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-04.png",
        "Wall Breaker": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-05.png",
        "Balloon": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-06.png",
        "Wizard": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-07.png",
        "Healer": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-08.png",
        "Dragon": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-09.png",
        "P.E.K.K.A": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-10.png",
        "Baby Dragon": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-12.png",
        "Miner": "/fwa/assets/elixir troops/Icons_by_Leonart93_FIverr-11.png",
        "Electro Dragon": "/fwa/assets/elixir troops/Avatar_Electro_Dragon.png",
        "Dragon Rider": "/fwa/assets/elixir troops/Avatar_Dragon_Rider.png",
        "Electro Titan": "/fwa/assets/elixir troops/Avatar_Electro_Dragon.png",
        "Root Rider": "/fwa/assets/elixir troops/Avatar_Root_Rider.png",
        "Thrower": "/fwa/assets/elixir troops/Avatar_Thrower.png",
        "Yeti": "/fwa/assets/elixir troops/Avatar_Yeti.png",    
    };

    const superTroopImages = {

        "Super Barbarian": "/fwa/assets/super troops/Super_Barb.PNG",
        "Super Archer": "/fwa/assets/super troops/Super_Archer.PNG",

    function showMilitary(event, type){

        const grid =
            document.getElementById("military-grid");
        
        grid.classList.add("fade");

        setTimeout(() => {

            grid.innerHTML = "";

            items.forEach(item => {

                const percent =
                    (item.level / item.maxLevel) * 100;
                const badge =
                    item.level === item.maxLevel
                        ? `<span class="max-badge">MAX</span>`
                        : `<small>Lv ${item.level}/${item.maxLevel}</small>`;
                
            grid.innerHTML += `
    
    <div class="military-card">
    
        <img
            src="${images[item.name]}"
            alt="${item.name}"
            onerror="this.src='/fwa/assets/badges/default.png'"
        >
        
        <h4>${item.name}</h4>
    
         ${badge}
        
        <div class="hero-bar">
        
            <div
                class="hero-fill"
                style="width:${percent}%"
            ></div>
        
        </div>
    
    </div>
    
    `;
    
        });

        grid.classList.remove("fade");
    
    },200);
