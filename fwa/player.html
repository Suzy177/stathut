<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Search | StatHut</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:"Segoe UI",sans-serif;
}

body{

    background:linear-gradient(
        135deg,
        #dbeafe,
        #eef2ff
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

}

.container{

    width:100%;

    max-width:1000px;

}

h1{

    text-align:center;

    color:#1f3c88;

    margin-bottom:30px;

    font-size:42px;

}

.search-box{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-bottom:40px;

}

.search-box input{

    width:420px;

    padding:16px;

    border:none;

    border-radius:14px;

    font-size:16px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.search-box button{

    border:none;

    background:#2563eb;

    color:white;

    padding:16px 26px;

    border-radius:14px;

    cursor:pointer;

    font-weight:700;

    transition:.25s;

}

.search-box button:hover{

    transform:translateY(-2px);

    background:#1d4ed8;

}

.player-card{

    background:white;

    border-radius:24px;

    padding:35px;

    box-shadow:0 20px 45px rgba(0,0,0,.10);

    animation:fadeUp .5s ease;

}

.player-banner{

    position:relative;

    height:260px;

    border-radius:24px;

    overflow:hidden;

    margin-bottom:35px;

    background:linear-gradient(
        135deg,
        #1f3c88,
        #3458b5
    );

}

.player-header h2{

    font-size:42px;

    color:#1f3c88;

    margin-bottom:10px;

}

.player-tag{

    display:inline-block;

    padding:8px 18px;

    border-radius:999px;

    background:#eef2ff;

    color:#304a9c;

    font-weight:700;

    margin-bottom:14px;

}

.player-clan{

    color:#6b7280;

    font-size:18px;

}

.player-top-stats{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:35px;

}

.top-stat{

    background:#f8fbff;

    border-radius:18px;

    padding:22px;

    text-align:center;

}

.top-stat span{

    font-size:34px;

}

.top-stat h3{

    margin:12px 0 6px;

    color:#1f3c88;

    font-size:30px;

}

.top-stat small{

    color:#6b7280;

}

.overview-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.overview-card{

    background:#f8fbff;

    border-radius:18px;

    padding:24px;

    text-align:center;

}

.overview-card h4{

    margin-bottom:14px;

    color:#1f3c88;

}

.overview-card p{

    font-size:30px;

    font-weight:800;

}

.th-banner{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    object-fit:cover;

    opacity:.25;

}

.banner-overlay{

    position:relative;

    z-index:2;

    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

}

.player-banner h2{

    color:white;

    font-size:48px;

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(25px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

    .heroes-section{

        margin-top:40px;

    }

    .heroes-section h2{
    
        color:#1f3c88;
    
        margin-bottom:25px;
    
        font-size:32px;
    
    }

    #heroes-grid{
    
        display:grid;
    
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    
        gap:20px;
    
    }

    .hero-card{

        background:white;
    
        border-radius:22px;
    
        padding:22px;
    
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    
        transition:all .25s ease;
    
        overflow:hidden;

    }

    .hero-card:hover{

        transform:translateY(-6px);
    
        box-shadow:0 20px 45px rgba(0,0,0,.15);

    }
    
    .hero-card h3{
    
        color:#1f3c88;
    
        margin-bottom:8px;
    
    }
    
    .hero-card p{
    
        color:#6b7280;
    
        margin-bottom:14px;
    
    }
    
    .hero-bar{
    
        width:100%;
    
        height:10px;
    
        background:#ececec;
    
        border-radius:999px;
    
        overflow:hidden;
    
        margin-bottom:18px;
    
    }
    
    .hero-fill{
    
        height:100%;

        border-radius:999px;
    
        background:linear-gradient(
            90deg,
            #4CAF50,
            #81C784
        );
        position:relative;
        
        overflow:hidden;
    
        transition:width 1s ease;
    
    }

    .hero-fill::after{

    content:"";

    position:absolute;

    left:-40%;

    top:0;

    width:35%;

    height:100%;

    background:rgba(255,255,255,.35);

    transform:skewX(-20deg);

    animation:shine 2.5s infinite;

}
    
    .equipment-list{
    
        margin:0;
    
        padding-left:18px;
    
    }
    
    .equipment-list li{
    
        margin-bottom:8px;
    
    }
    
    .hero-title{

        display:flex;
    
        align-items:center;
    
        gap:14px;
    
        margin-bottom:14px;

    }

    .hero-title h3{

        font-size:22px;
    
        color:#1f3c88;

    }
    
    .hero-icon{
    
        width:68px;
    
        height:68px;
    
        object-fit:contain;

        transition:.3s;
    
    }
    
    .equipment-container{

        display:flex;
    
        flex-direction:column;
    
        gap:8px;
    
        margin-top:15px;
    
    }

    .equipment-pill{
    
        display:flex;
    
        justify-content:space-between;
    
        align-items:center;
    
        padding:10px 14px;
    
        background:#f7f9fc;
    
        border-radius:12px;
    
        font-size:14px;
    
    }

    .equipment-pill strong{
    
        color:#2563eb;
    
    }

    .hero-level{

        display:flex;
    
        justify-content:space-between;
    
        align-items:center;
    
        margin-bottom:15px;
    
        color:#6b7280;
    
    }

    .hero-percent{
    
        background:#2563eb;
    
        color:white;
    
        padding:5px 12px;
    
        border-radius:999px;
    
        font-size:13px;
    
        font-weight:700;
    
    }

    .hero-max{
    
        background:#16a34a;
    
        color:white;
    
        padding:5px 12px;
    
        border-radius:999px;
    
        font-size:13px;
    
        font-weight:700;
    
    }

    .hero-card:hover .hero-icon{

        transform:scale(1.15) rotate(-5deg);
    
    }

    @keyframes shine{

        0%{
    
            left:-40%;
    
        }
    
        100%{
    
            left:130%;
    
        }
    
    }

</style>

<body>

<div class="container">

    <h1>🔍 Player Search</h1>

    <div class="search-box">

        <input
            id="player-tag"
            type="text"
            placeholder="Enter Player Tag (P280R8R)"
        >

        <button
            onclick="searchPlayer()"
        >
            Search
        </button>

    </div>

    <div id="player-card" class="player-card" style="display:none;">

    <div class="player-header">

    <div class="player-banner">

        <div class="banner-overlay">

            <img
                id="th-banner"
                class="th-banner"
                src=""
            >

            <h2 id="player-name">
                Loading...
            </h2>

            <div
                id="player-tag-badge"
                class="player-tag"
            >
                #TAG
            </div>

            <p
                id="player-clan"
                class="player-clan"
            >
                Clan
            </p>
        </div>
    </div>
    </div>

    <section
        id="heroes-section"
        class="heroes-section"
        style="display:none;"
    >

        <h2>❤️ Heroes</h2>
    
        <div id="heroes-grid">
    
        </div>

    </section>

    <div class="player-top-stats">

        <div class="top-stat">
            <span>🏰</span>
            <h3 id="townhall">18</h3>
            <small>Town Hall</small>
        </div>

        <div class="top-stat">
            <span>⭐</span>
            <h3 id="exp">253</h3>
            <small>XP Level</small>
        </div>

        <div class="top-stat">
            <span>🏆</span>
            <h3 id="league">Unranked</h3>
            <small>League</small>
        </div>

    </div>

    <div class="overview-grid">

        <div class="overview-card">
            <h4>🏆 Trophies</h4>
            <p id="trophies"></p>
        </div>

        <div class="overview-card">
            <h4>⭐ Best</h4>
            <p id="best"></p>
        </div>

        <div class="overview-card">
            <h4>⚔ War Stars</h4>
            <p id="warstars"></p>
        </div>

        <div class="overview-card">
            <h4>🤝 Donations</h4>
            <p id="donations"></p>
        </div>

    </div>

</div>

<script>

async function searchPlayer() {

    const tag = document
        .getElementById("player-tag")
        .value
        .trim()
        .replace("#", "");

    if (!tag) {

        alert("Enter a Player Tag");

        return;

    }

    try {

        const response = await fetch(
            `https://api.stathut.in/api/player/${tag}`
        );

        const player = await response.json();

        const heroesGrid =
            document.getElementById("heroes-grid");
    
        heroesGrid.innerHTML = "";
    
        document.getElementById("heroes-section").style.display =
            "block";
        
        document.getElementById("donations").textContent =
            player.donations;
        
        const heroImages = {
            "Barbarian King":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-22.png",
            "Archer Queen":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-23.png",
            "Grand Warden":
                "/fwa/assets/heroes/Icons_by_Leonart93_FIverr-24.png",
            "Royal Champion":
                "/fwa/assets/heroes/RC_Wastelands_01_NoShadow.png",
            "Minion Prince":
                "/fwa/assets/heroes/MinionPrince_wwe_f82_3k.png",
            "Dragon Duke":
                "/fwa/assets/heroes/DD_SoundOfClash_f10_4k.png"};
        
        const thImages = {

            18: "/fwa/assets/townhalls/th18.jpg",
        
            17: "/fwa/assets/townhalls/th17.jpg",
        
            16: "/fwa/assets/townhalls/th16.jpg",
        
            15: "/fwa/assets/townhalls/th15.jpg"
        
        };
        
        player.heroes
            .filter(hero => hero.village === "home")
            .forEach(hero => {
                
                const percent =
                    (hero.level / hero.maxLevel) * 100;
                const heroStatus =
                    hero.level === hero.maxLevel
                        ? `<span class="hero-max">MAX</span>`
                        : `<span class="hero-percent">${Math.round(percent)}%</span>`;

                const equipment = hero.equipment
                    ? hero.equipment.map(eq =>
                        `
                        <div class="equipment-pill">
                        <span>${eq.name}</span>
                        <strong>Lv ${eq.level}</strong>
                        </div>
                        `
                        ).join("")
                        : "";

                heroesGrid.innerHTML += `

                <div class="hero-card">
                
                   <div class="hero-title">
                       <img
                           src="${heroImages[hero.name]}"
                           class="hero-icon"
                           alt="${hero.name}"
                       >
                       <h3>${hero.name}</h3>
                   </div>    

                    <div class="hero-level">
                        <span>
                            Level ${hero.level} / ${hero.maxLevel}
                        </span>
                        ${heroStatus}
                    </div>
                    

                    <div class="hero-bar">

                        <div
                            class="hero-fill"
                            style="width:${percent}%"
                        ></div>

                    </div>

                    <div class="equipment-container">
                    
                        ${equipment}

                    </ul>

                </div>

                `;

            });

        document.getElementById("player-card").style.display =
            "block";

        document.getElementById("player-name").textContent =
            player.name;

        document.getElementById("player-clan").textContent =
            player.clan;

        document.getElementById("townhall").textContent =
            player.townHall;

        document.getElementById("th-banner").src =
            thImages[player.townHall];

        document.getElementById("exp").textContent =
            player.expLevel;

        document.getElementById("trophies").textContent =
            player.trophies;

        document.getElementById("best").textContent =
            player.bestTrophies;

        document.getElementById("warstars").textContent =
            player.warStars;

        document.getElementById("donations").textContent =
            player.donations;

    }

    catch (error) {

        console.error(error);

        alert("Player not found");

    }

}

</script>

</body>

</html>
