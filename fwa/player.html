<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Search | StatHut</title>

</head>

<body>

<div class="container">

    <h1>🔍 Player Search</h1>

    <div class="search-box">

        <input
            id="player-tag"
            type="text"
            placeholder="Enter Player Tag (P280R8R)"
        >

        <button
            onclick="searchPlayer()"
        >
            Search
        </button>

    </div>

    <div
        id="player-card"
        style="display:none;"
    >

        <h2 id="player-name">
            Loading...
        </h2>

        <p id="player-clan"></p>

        <div class="stats">

            <div class="stat">
                <h3>🏰 Town Hall</h3>
                <p id="townhall"></p>
            </div>

            <div class="stat">
                <h3>⭐ XP Level</h3>
                <p id="exp"></p>
            </div>

            <div class="stat">
                <h3>🏆 Trophies</h3>
                <p id="trophies"></p>
            </div>

            <div class="stat">
                <h3>👑 Best</h3>
                <p id="best"></p>
            </div>

            <div class="stat">
                <h3>⚔ War Stars</h3>
                <p id="warstars"></p>
            </div>

            <div class="stat">
                <h3>🤝 Donations</h3>
                <p id="donations"></p>
            </div>

        </div>

    </div>

</div>

<script>

async function searchPlayer() {

    const tag = document
        .getElementById("player-tag")
        .value
        .trim()
        .replace("#", "");

    if (!tag) {

        alert("Enter a Player Tag");

        return;

    }

    try {

        const response = await fetch(
            `https://api.stathut.in/api/player/${tag}`
        );

        const player = await response.json();

        document.getElementById("player-card").style.display =
            "block";

        document.getElementById("player-name").textContent =
            player.name;

        document.getElementById("player-clan").textContent =
            player.clan;

        document.getElementById("townhall").textContent =
            player.townHall;

        document.getElementById("exp").textContent =
            player.expLevel;

        document.getElementById("trophies").textContent =
            player.trophies;

        document.getElementById("best").textContent =
            player.bestTrophies;

        document.getElementById("warstars").textContent =
            player.warStars;

        document.getElementById("donations").textContent =
            player.donations;

    }

    catch (error) {

        console.error(error);

        alert("Player not found");

    }

}

</script>

</body>

</html>
